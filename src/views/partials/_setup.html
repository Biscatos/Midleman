  <!-- ═══ SETUP PAGE ═══ -->
  <div class="auth-page" id="authSetup">
    <div class="auth-topbar">
      <div class="auth-topbar-left">
        <img src="/logo.png" alt="Midleman">
        <span>Midleman</span>
      </div>
      <div class="auth-topbar-right">
        <a href="/health">Status</a>
      </div>
    </div>
    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-brand"><img src="/logo.png" alt="Midleman"></div>
        <h2>Setup</h2>
        <div class="subtitle">Configure your administrative credentials and secure access.</div>
        <div class="auth-error" id="setupError"></div>

        <div class="auth-step active" id="setupStep1">
          <form onsubmit="event.preventDefault(); setupStep2();" style="display: contents;">
            <div class="form-group"><label>Username</label><input type="text" id="setupUser" placeholder="admin"
                autocomplete="username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="setupPass"
                placeholder="Min. 6 characters" autocomplete="new-password"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="setupPass2"
                placeholder="Repeat password" autocomplete="new-password"></div>
            <button type="submit" class="btn btn-primary">Continue to 2FA Setup</button>
          </form>
        </div>

        <div class="auth-step" id="setupStep2">
          <p style="font-size:14px;color:#71717a;margin-bottom:16px;text-align:center">Scan this QR code with your
            authenticator app (Google Authenticator, Authy, etc.)</p>
          <div class="qr-container" id="setupQrContainer"></div>
          <p style="font-size:12px;color:#52525b;text-align:center;margin-bottom:4px">Or enter this key manually:</p>
          <div class="totp-secret-box" id="setupSecretDisplay"></div>
          <form onsubmit="event.preventDefault(); completeSetup();" style="display: contents;">
            <div class="form-group"><label>Enter 6-digit code to verify</label><input type="text" id="setupTotpCode"
                placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code"
                style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700"></div>
            <button type="submit" class="btn btn-primary">Create Account</button>
            <button type="button" class="btn" style="width:100%;justify-content:center;margin-top:8px"
              onclick="backToStep1()">Back</button>
          </form>
        </div>
      </div>
    </main>
    <footer class="auth-footer">midleman</footer>
  </div>
