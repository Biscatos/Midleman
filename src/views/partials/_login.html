  <!-- ═══ LOGIN PAGE ═══ -->
  <div class="auth-page" id="authLogin">
    <div class="auth-topbar">
      <div class="auth-topbar-left">
        <img src="/logo.png" alt="Midleman">
        <span>Midleman</span>
      </div>
      <div class="auth-topbar-right">
        <a href="/health">Status</a>
      </div>
    </div>
    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-brand"><img src="/logo.png" alt="Midleman"></div>
        <!-- Step 1: Credentials -->
        <div id="loginStep1" class="auth-step active">
          <h2>Sign In</h2>
          <div class="subtitle">Enter your credentials to access the dashboard.</div>
          <form onsubmit="event.preventDefault(); doLoginStep1();" style="display: contents;">
            <div class="form-group"><label>Username</label><input type="text" id="loginUser" placeholder="Username"
                autocomplete="username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Password"
                autocomplete="current-password"></div>
            <button type="submit" class="btn btn-primary" id="loginBtn1">Continue</button>
          </form>
        </div>
        <!-- Step 2: TOTP -->
        <div id="loginStep2" class="auth-step">
          <h2>Verification</h2>
          <div class="subtitle">Enter the 6-digit code from your authenticator app.</div>
          <div class="auth-error" id="loginTotpError"></div>
          <form onsubmit="event.preventDefault(); doLoginStep2();" style="display: contents;">
            <div class="form-group"><label>Authenticator Code</label><input type="text" id="loginTotp" placeholder="000000"
                maxlength="6" inputmode="numeric" autocomplete="one-time-code"
                style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700"></div>
            <button type="submit" class="btn btn-primary" id="loginBtn2">Sign In</button>
            <button type="button" class="btn" onclick="loginBackToStep1()"
              style="width:100%;justify-content:center;margin-top:8px;font-size:13px;color:#71717a;border:1px solid #27272a;background:transparent;cursor:pointer;border-radius:8px;height:40px;display:inline-flex;align-items:center">Back</button>
          </form>
        </div>
      </div>
    </main>
    <footer class="auth-footer">midleman</footer>
  </div>
