<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Entrar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0f; --text: #fafafa; --text2: #71717a;
      --input-bg: rgba(255,255,255,0.04); --input-bdr: rgba(255,255,255,0.09);
      --input-text: #d4d4d8; --input-ph: #3f3f46;
      --btn: #0078d4; --btn-hover: #005ea6;
      --err-bg: rgba(220,38,38,0.08); --err-bdr: rgba(220,38,38,0.2); --err-text: #f87171;
      --card-bg: #0e1014; --card-bdr: #1f2128;
      --back-bdr: #27272a; --back-hover: #18181b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f5f7; --text: #0f1015; --text2: #52525b;
        --input-bg: rgba(0,0,0,0.04); --input-bdr: rgba(0,0,0,0.12); --input-text: #0f1015; --input-ph: #a1a1aa;
        --card-bg: #ffffff; --card-bdr: #e4e4e7;
        --err-bg: rgba(220,38,38,0.06); --err-bdr: rgba(220,38,38,0.2); --err-text: #dc2626;
        --back-bdr: #d4d4d8; --back-hover: #ebebee;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--card-bg); border: 1px solid var(--card-bdr); border-radius: 12px;
      padding: 32px 28px;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; margin-top: 14px; }
    input {
      width: 100%; padding: 10px 12px;
      background: var(--input-bg); border: 1px solid var(--input-bdr);
      border-radius: 6px; color: var(--input-text); font-size: 14px; outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input:focus { border-color: var(--btn); }
    input::placeholder { color: var(--input-ph); }
    .totp-input { text-align: center; font-size: 22px; letter-spacing: 8px; font-weight: 700; }
    button.primary {
      width: 100%; padding: 11px; margin-top: 20px;
      background: var(--btn); color: #fff; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    button.primary:hover:not(:disabled) { background: var(--btn-hover); }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    button.back {
      width: 100%; padding: 9px; margin-top: 8px;
      background: transparent; color: var(--text2); border: 1px solid var(--back-bdr);
      border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    button.back:hover { background: var(--back-hover); }
    .err {
      margin-top: 14px; padding: 8px 12px;
      background: var(--err-bg); border: 1px solid var(--err-bdr); border-radius: 6px;
      color: var(--err-text); font-size: 12.5px;
    }
    .hidden { display: none; }
    .expired-icon { font-size: 36px; margin-bottom: 14px; }
    .expired-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .expired-msg { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
    button.retry {
      width: 100%; padding: 11px;
      background: var(--btn); color: #fff; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    button.retry:hover { background: var(--btn-hover); }

    .consent-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      z-index: 1000;
    }
    .consent-box {
      width: 100%; max-width: 520px; max-height: 85vh;
      background: var(--card-bg); border: 1px solid var(--card-bdr); border-radius: 12px;
      display: flex; flex-direction: column;
    }
    .consent-head { padding: 20px 24px 12px; border-bottom: 1px solid var(--card-bdr); }
    .consent-head h2 { font-size: 16px; font-weight: 600; color: var(--text); }
    .consent-body {
      padding: 16px 24px; overflow-y: auto; flex: 1;
      font-size: 13px; line-height: 1.6; color: var(--text);
    }
    .consent-body p { margin: 0 0 10px; }
    .consent-body p:last-child { margin-bottom: 0; }
    .consent-body ul { padding-left: 20px; margin: 0 0 10px; }
    .consent-body li { margin: 4px 0; }
    .consent-body a { color: var(--btn); text-decoration: underline; }
    .consent-body strong { font-weight: 600; }
    .consent-foot { padding: 14px 24px 18px; border-top: 1px solid var(--card-bdr); }
    .consent-foot button {
      width: 100%; padding: 11px;
      background: var(--btn); color: #fff; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .consent-foot button:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <!-- Consent modal — only rendered if enabled -->
  <div id="consentModal" class="consent-overlay hidden" data-enabled="{{CONSENT_ENABLED}}">
    <div class="consent-box">
      <div class="consent-head"><h2>{{CONSENT_TITLE}}</h2></div>
      <div class="consent-body">{{CONSENT_BODY}}</div>
      <div class="consent-foot"><button type="button" id="consentAccept">Accept and continue</button></div>
    </div>
  </div>

  <div class="card">
    <h1 id="heading">Sign in</h1>
    <p class="sub" id="subText">Enter your credentials to continue.</p>

    <!-- Session expired / generic fatal error panel -->
    <div id="stepExpired" class="hidden">
      <div class="expired-icon">⏱️</div>
      <div class="expired-title" id="expiredTitle">Session expired</div>
      <div class="expired-msg" id="expiredMsg">Your sign-in session has expired. Please close this tab and start the sign-in process again from the application.</div>
      <button class="retry" id="btnClose" type="button" onclick="window.close()">Close tab</button>
    </div>

    <!-- Step 1: username + password -->
    <div id="step1">
      <label id="labelUser" for="username">Username or email</label>
      <input id="username" type="text" autocomplete="username" required autofocus>

      <label id="labelPw" for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <button id="loginBtn" class="primary" type="button">Sign in & authorize</button>
      <div id="err1" class="err hidden"></div>
    </div>

    <!-- Step 2: TOTP -->
    <div id="step2" class="hidden">
      <label id="labelTotp" for="totp">6-digit code from your authenticator</label>
      <input id="totp" type="text" class="totp-input" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code">

      <button id="totpBtn" class="primary" type="button">Verify & authorize</button>
      <button id="backBtn" class="back" type="button">Back</button>
      <div id="err2" class="err hidden"></div>
    </div>

  </div>

  <script>
    const AUTH_REQUEST = '{{AUTH_REQUEST}}';
    let authRequest = AUTH_REQUEST;
    let challengeToken = '';

    // ── i18n ──────────────────────────────────────────────────────────────────
    const STRINGS = {
      en: {
        pageTitle:       'Sign in',
        heading:         'Sign in',
        sub:             'Enter your credentials to continue.',
        labelUser:       'Username or email',
        labelPassword:   'Password',
        labelTotp:       '6-digit code from your authenticator',
        btnLogin:        'Sign in & authorize',
        btnLoggingIn:    'Signing in\u2026',
        btnVerify:       'Verify & authorize',
        btnVerifying:    'Verifying\u2026',
        btnBack:         'Back',
        btnClose:        'Close tab',
        consentAccept:   'Accept and continue',
        errRequired:     'Username and password are required.',
        errTotpLen:      'Enter the 6-digit code.',
        errNetwork:      'Network error. Please try again.',
        errLogin:        'Login failed.',
        errVerify:       'Verification failed.',
        expiredTitle:    'Session expired',
        expiredMsg:      'Your sign-in session has expired. Please close this tab and start the sign-in process again from the application.',
      },
      pt: {
        pageTitle:       'Entrar',
        heading:         'Entrar',
        sub:             'Introduza as suas credenciais para continuar.',
        labelUser:       'Nome de utilizador ou email',
        labelPassword:   'Palavra-passe',
        labelTotp:       'Código de 6 dígitos da sua aplicação autenticadora',
        btnLogin:        'Entrar e autorizar',
        btnLoggingIn:    'A entrar\u2026',
        btnVerify:       'Verificar e autorizar',
        btnVerifying:    'A verificar\u2026',
        btnBack:         'Voltar',
        btnClose:        'Fechar separador',
        consentAccept:   'Aceitar e continuar',
        errRequired:     'Nome de utilizador e palavra-passe são obrigatórios.',
        errTotpLen:      'Introduza o código de 6 dígitos.',
        errNetwork:      'Erro de rede. Tente novamente.',
        errLogin:        'Falha no início de sessão.',
        errVerify:       'Falha na verificação.',
        expiredTitle:    'Sessão expirada',
        expiredMsg:      'A sua sessão de início de sessão expirou. Feche este separador e inicie o processo de início de sessão novamente na aplicação.',
      },
    };

    function detectLang() {
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        if (l.toLowerCase().startsWith('pt')) return 'pt';
      }
      return 'en';
    }

    const T = STRINGS[detectLang()];

    function applyStrings() {
      document.documentElement.lang = detectLang();
      document.title = T.pageTitle;
      document.getElementById('heading').textContent   = T.heading;
      document.getElementById('subText').textContent   = T.sub;
      document.getElementById('labelUser').textContent = T.labelUser;
      document.getElementById('labelPw').textContent   = T.labelPassword;
      document.getElementById('labelTotp').textContent = T.labelTotp;
      loginBtn.textContent  = T.btnLogin;
      totpBtn.textContent   = T.btnVerify;
      backBtn.textContent   = T.btnBack;
      document.getElementById('expiredTitle').textContent = T.expiredTitle;
      document.getElementById('expiredMsg').textContent   = T.expiredMsg;
      document.getElementById('btnClose').textContent     = T.btnClose;
      const ca = document.getElementById('consentAccept');
      if (ca) ca.textContent = T.consentAccept;
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const stepExpired = document.getElementById('stepExpired');
    const err1 = document.getElementById('err1');
    const err2 = document.getElementById('err2');
    const loginBtn = document.getElementById('loginBtn');
    const totpBtn = document.getElementById('totpBtn');
    const backBtn = document.getElementById('backBtn');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const totpEl = document.getElementById('totp');

    applyStrings();

    function showErr(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
    function hideErr(el) { el.classList.add('hidden'); el.textContent = ''; }

    function showExpired(title, msg) {
      step1.classList.add('hidden');
      step2.classList.add('hidden');
      stepExpired.classList.remove('hidden');
      if (title) document.getElementById('expiredTitle').textContent = title;
      if (msg)   document.getElementById('expiredMsg').textContent = msg;
    }

    function isSessionExpiredError(data) {
      const msg = (data.error_description || data.error || '').toLowerCase();
      return msg.includes('expired') || msg.includes('session') || msg.includes('restart');
    }

    function showStep1() {
      step2.classList.add('hidden');
      stepExpired.classList.add('hidden');
      step1.classList.remove('hidden');
      hideErr(err2);
      totpEl.value = '';
      challengeToken = '';
      usernameEl.focus();
    }
    function showStep2() {
      step1.classList.add('hidden');
      step2.classList.remove('hidden');
      hideErr(err1);
      totpEl.value = '';
      totpEl.focus();
    }

    async function doLogin() {
      hideErr(err1);
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) { showErr(err1, T.errRequired); return; }

      loginBtn.disabled = true; loginBtn.textContent = T.btnLoggingIn;
      try {
        const res = await fetch('/oauth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ auth_request: authRequest, username, password }),
        });
        const data = await res.json().catch(() => ({}));

        if (data.auth_request) authRequest = data.auth_request;

        if (res.ok && data.status === 'ok' && data.redirect) {
          window.location.href = data.redirect;
          return;
        }
        if (res.ok && data.status === 'totp_required') {
          challengeToken = data.challengeToken;
          showStep2();
          return;
        }
        if (isSessionExpiredError(data)) {
          showExpired(T.expiredTitle, T.expiredMsg);
          return;
        }
        showErr(err1, data.error || data.error_description || T.errLogin);
      } catch {
        showErr(err1, T.errNetwork);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = T.btnLogin;
      }
    }

    async function doTotp() {
      hideErr(err2);
      const code = totpEl.value.trim();
      if (!code || code.length !== 6) { showErr(err2, T.errTotpLen); return; }

      totpBtn.disabled = true; totpBtn.textContent = T.btnVerifying;
      try {
        const res = await fetch('/oauth/totp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeToken, totpCode: code }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.status === 'ok' && data.redirect) {
          window.location.href = data.redirect;
          return;
        }
        if (data.challengeToken) challengeToken = data.challengeToken;
        if (isSessionExpiredError(data)) {
          showExpired(T.expiredTitle, T.expiredMsg);
          return;
        }
        showErr(err2, data.error || data.error_description || T.errVerify);
      } catch {
        showErr(err2, T.errNetwork);
      } finally {
        totpBtn.disabled = false;
        totpBtn.textContent = T.btnVerify;
      }
    }

    loginBtn.addEventListener('click', doLogin);
    totpBtn.addEventListener('click', doTotp);
    backBtn.addEventListener('click', showStep1);
    passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    usernameEl.addEventListener('keydown', e => { if (e.key === 'Enter') passwordEl.focus(); });
    totpEl.addEventListener('keydown', e => { if (e.key === 'Enter') doTotp(); });

    (function initConsent() {
      const modal = document.getElementById('consentModal');
      if (!modal) return;
      if (modal.dataset.enabled !== '1') { modal.remove(); return; }
      modal.classList.remove('hidden');
      loginBtn.disabled = true;
      usernameEl.disabled = true;
      passwordEl.disabled = true;
      document.getElementById('consentAccept').addEventListener('click', () => {
        modal.remove();
        loginBtn.disabled = false;
        usernameEl.disabled = false;
        passwordEl.disabled = false;
        usernameEl.focus();
      });
    })();
  </script>
</body>
</html>
