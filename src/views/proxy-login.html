<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{PROFILE_NAME}} — Midleman</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid #1a1a1a;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #a1a1aa;
    }
    .topbar-left img { width: 22px; height: 22px; border-radius: 4px; }
    .topbar-right a { font-size: 13px; color: #52525b; text-decoration: none; }
    .topbar-right a:hover { color: #a1a1aa; }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card { width: 100%; max-width: 380px; }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    h2 { font-size: 22px; font-weight: 700; color: #fafafa; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #71717a; margin-bottom: 24px; }
    .profile-badge {
      display: inline-block;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #a1a1aa;
      font-family: 'SF Mono', ui-monospace, monospace;
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.visible { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #fafafa;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus {
      border-color: #3f3f46;
      box-shadow: 0 0 0 2px rgba(63,63,70,.3);
    }
    .form-group input::placeholder { color: #3f3f46; }
    .totp-input {
      text-align: center;
      font-size: 24px;
      letter-spacing: 8px;
      font-weight: 700;
    }
    .btn-primary {
      width: 100%;
      height: 42px;
      border-radius: 8px;
      border: none;
      background: #fafafa;
      color: #09090b;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .btn-primary:hover { background: #e4e4e7; }
    .btn-primary:active { background: #d4d4d8; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(9,9,11,.25);
      border-top-color: #09090b;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-back {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
      font-size: 13px;
      color: #71717a;
      border: 1px solid #27272a;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      height: 40px;
      display: inline-flex;
      align-items: center;
    }
    .btn-back:hover { background: #18181b; }
    .step { display: none; }
    .step.active { display: block; }
    .qr-wrap {
      text-align: center;
      margin: 16px 0;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      display: inline-block;
    }
    .qr-wrap img { width: 180px; height: 180px; }
    .setup-info {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .secret-code {
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 8px 12px;
      color: #fafafa;
      word-break: break-all;
      text-align: center;
      margin: 12px 0;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #27272a;
      padding: 20px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    @media (max-width: 480px) {
      .card { max-width: 100%; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="/logo.png" alt="Midleman">
      <span>Midleman</span>
    </div>
    <div class="topbar-right">
      <a href="/health">Status</a>
    </div>
  </div>

  <main class="main">
    <div class="card">
      <div class="brand"><img src="/logo.png" alt="Midleman"></div>

      <!-- Step 1: Credentials -->
      <div class="step active" id="step1">
        <h2>Sign In</h2>
        <div class="subtitle">
          Authenticate to access <span class="profile-badge">{{PROFILE_NAME}}</span>
        </div>
        <div class="error" id="loginError"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="loginBtn" onclick="doStep1()">Continue</button>
      </div>

      <!-- Step 2a: TOTP Verify (user already has TOTP set up) -->
      <div class="step" id="step2verify">
        <h2>Verification</h2>
        <div class="subtitle">Enter the 6-digit code from your authenticator app.</div>
        <div class="error" id="totpVerifyError"></div>
        <div class="form-group">
          <label>Authenticator Code</label>
          <input type="text" id="totpVerifyCode" class="totp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        </div>
        <button class="btn-primary" id="totpVerifyBtn" onclick="doTotpVerify()">Sign In</button>
        <button class="btn-back" onclick="backToStep1()">Back</button>
      </div>

      <!-- Step 2b: TOTP Setup (first time, profile requires 2FA) -->
      <div class="step" id="step2setup">
        <h2>Set Up 2FA</h2>
        <div class="setup-info">
          This application requires two-factor authentication.
          Scan the QR code with your authenticator app (Google Authenticator, Authy, etc.).
        </div>
        <div class="error" id="totpSetupError"></div>
        <div style="text-align:center">
          <div class="qr-wrap">
            <img id="qrImage" src="" alt="QR Code">
          </div>
        </div>
        <div class="secret-code" id="secretCode" onclick="copySecret()" title="Click to copy"></div>
        <div class="form-group">
          <label>Enter the 6-digit code to confirm</label>
          <input type="text" id="totpSetupCode" class="totp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        </div>
        <button class="btn-primary" id="totpSetupBtn" onclick="doTotpSetup()">Verify & Sign In</button>
        <button class="btn-back" onclick="backToStep1()">Back</button>
      </div>
    </div>
  </main>

  <footer class="footer">midleman</footer>

  <script>
    const PROFILE = '{{PROFILE_NAME}}';
    let challengeToken = '';
    let setupTotpSecret = '';

    // Enter key handlers
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doStep1(); });
    document.getElementById('totpVerifyCode').addEventListener('keydown', e => { if (e.key === 'Enter') doTotpVerify(); });
    document.getElementById('totpSetupCode').addEventListener('keydown', e => { if (e.key === 'Enter') doTotpSetup(); });

    function showStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearErrors() {
      document.querySelectorAll('.error').forEach(e => { e.classList.remove('visible'); e.textContent = ''; });
    }
    function backToStep1() {
      clearErrors();
      challengeToken = '';
      setupTotpSecret = '';
      showStep('step1');
    }

    async function doStep1() {
      const btn = document.getElementById('loginBtn');
      clearErrors();

      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      if (!username || !password) { showError('loginError', 'Username and password are required.'); return; }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      let navigating = false;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) { showError('loginError', data.error || 'Login failed.'); return; }

        if (data.status === 'ok') {
          navigating = true;
          doRedirect();
          return;
        }

        challengeToken = data.challengeToken;

        if (data.status === 'totp_required') {
          showStep('step2verify');
          document.getElementById('totpVerifyCode').value = '';
          document.getElementById('totpVerifyCode').focus();
        } else if (data.status === 'totp_setup') {
          setupTotpSecret = data.totpSecret;
          document.getElementById('qrImage').src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(data.otpauthUrl);
          document.getElementById('secretCode').textContent = data.totpSecret;
          showStep('step2setup');
          document.getElementById('totpSetupCode').value = '';
          document.getElementById('totpSetupCode').focus();
        }
      } catch (err) {
        showError('loginError', 'Connection error. Please try again.');
      } finally {
        if (!navigating) {
          btn.disabled = false;
          btn.textContent = 'Continue';
        }
      }
    }

    async function doTotpVerify() {
      const btn = document.getElementById('totpVerifyBtn');
      clearErrors();

      const code = document.getElementById('totpVerifyCode').value.trim();
      if (!code || code.length !== 6) { showError('totpVerifyError', 'Enter the 6-digit code.'); return; }

      btn.disabled = true;
      btn.textContent = 'Verifying...';

      let navigating = false;
      try {
        const res = await fetch('/auth/totp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeToken, totpCode: code }),
        });
        const data = await res.json();
        if (!res.ok) { showError('totpVerifyError', data.error || 'Verification failed.'); return; }
        navigating = true;
        doRedirect();
      } catch (err) {
        showError('totpVerifyError', 'Connection error. Please try again.');
      } finally {
        if (!navigating) {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      }
    }

    async function doTotpSetup() {
      const btn = document.getElementById('totpSetupBtn');
      clearErrors();

      const code = document.getElementById('totpSetupCode').value.trim();
      if (!code || code.length !== 6) { showError('totpSetupError', 'Enter the 6-digit code from your authenticator.'); return; }

      btn.disabled = true;
      btn.textContent = 'Verifying...';

      let navigating = false;
      try {
        const res = await fetch('/auth/totp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeToken, totpCode: code, totpSecret: setupTotpSecret }),
        });
        const data = await res.json();
        if (!res.ok) { showError('totpSetupError', data.error || 'Setup failed.'); return; }
        navigating = true;
        doRedirect();
      } catch (err) {
        showError('totpSetupError', 'Connection error. Please try again.');
      } finally {
        if (!navigating) {
          btn.disabled = false;
          btn.textContent = 'Verify & Sign In';
        }
      }
    }

    function doRedirect() {
      // Show loading state on the active button before navigating
      const activeStep = document.querySelector('.step.active');
      if (activeStep) {
        const btn = activeStep.querySelector('.btn-primary');
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner"></span>';
        }
      }
      const searchParams = new URLSearchParams(window.location.search);
      const redirect = searchParams.get('redirect');
      if (redirect) {
        window.location.href = redirect;
      } else if (window.location.pathname.endsWith('/auth/login')) {
        window.location.href = '/';
      } else {
        window.location.reload();
      }
    }

    function copySecret() {
      const text = document.getElementById('secretCode').textContent;
      navigator.clipboard.writeText(text).catch(() => {});
    }
  </script>
</body>
</html>
