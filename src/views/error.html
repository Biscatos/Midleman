<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png">
  <title>{{STATUS}} — Midleman</title>
  <script>(function(){try{var k='midleman_theme',p=localStorage.getItem(k);if(p!=='dark'&&p!=='light'&&p!=='system')p='system';var t=p==='system'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;document.documentElement.setAttribute('data-theme',t);if(p==='system'&&window.matchMedia){var m=matchMedia('(prefers-color-scheme: dark)');var fn=function(e){if(localStorage.getItem(k)==='system')document.documentElement.setAttribute('data-theme',e.matches?'dark':'light')};if(m.addEventListener)m.addEventListener('change',fn);else if(m.addListener)m.addListener(fn)}}catch(e){}})();</script>
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0f1117;
      --text: #e4e6f0;
      --text2: #8b8fa7;
      --text3: #5d6180;
      --accent: #2899f5;
      --rule: #2e3148;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #18181b;
      --text2: #52525b;
      --text3: #a1a1aa;
      --accent: #0064b3;
      --rule: #e4e4e7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 420px;
      width: 100%;
    }

    .code {
      font-family: 'SF Mono', ui-monospace, 'Menlo', Consolas, monospace;
      font-size: 13px;
      color: var(--text3);
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    p a {
      color: var(--accent);
      text-decoration: none;
    }
    p a:hover { text-decoration: underline; }

    .links {
      padding-top: 18px;
      border-top: 1px solid var(--rule);
      display: flex;
      gap: 20px;
      font-size: 13px;
    }

    .links a {
      color: var(--text2);
      text-decoration: none;
      transition: color .15s;
    }

    .links a:hover { color: var(--text); }
  </style>
</head>

<body>
  <main>
    <div class="code">{{STATUS_CODE}} · {{TITLE}}</div>
    <h1>{{TITLE}}</h1>
    <p>{{MESSAGE}}</p>
    <div class="links">
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
    </div>
  </main>
</body>

</html>
