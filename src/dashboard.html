<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midleman Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3344;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --red: #e17055;
    --orange: #fdcb6e;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--accent2); }
  .header-actions { display: flex; gap: 8px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
  }
  .status-badge.online { background: rgba(0,184,148,0.15); color: var(--green); }
  .status-badge.offline { background: rgba(225,112,85,0.15); color: var(--red); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-badge.online .status-dot { background: var(--green); }
  .status-badge.offline .status-dot { background: var(--red); }

  .container { max-width: 960px; margin: 0 auto; padding: 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 { font-size: 16px; font-weight: 600; }
  .card-body { padding: 20px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 700; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span-2 { grid-column: span 2; }
  .form-group label {
    font-size: 13px; font-weight: 500; color: var(--text2);
  }
  .form-group input, .form-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .form-group input::placeholder { color: var(--text2); opacity: 0.5; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5b4bd5; }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(225,112,85,0.15); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .profile-list { display: flex; flex-direction: column; gap: 12px; }
  .profile-item {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .profile-url { font-size: 13px; color: var(--text2); word-break: break-all; }
  .profile-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .profile-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: var(--bg); color: var(--text2);
  }
  .profile-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%; max-width: 540px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .close-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 20px; line-height: 1;
  }
  .close-btn:hover { color: var(--text); }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text2);
  }
  .empty-state p { margin-top: 8px; font-size: 14px; }

  .checkbox-group {
    display: flex; align-items: center; gap: 8px;
  }
  .checkbox-group input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--accent);
  }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.span-2 { grid-column: span 1; }
    .stats { grid-template-columns: 1fr 1fr; }
    .profile-item { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Midleman</span> Dashboard</h1>
  <div class="header-actions">
    <span id="statusBadge" class="status-badge offline">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </span>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Uptime</div>
      <div class="stat-value" id="statUptime">--</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active Requests</div>
      <div class="stat-value" id="statRequests">--</div>
    </div>
    <div class="stat">
      <div class="stat-label">Profiles</div>
      <div class="stat-value" id="statProfiles">--</div>
    </div>
    <div class="stat">
      <div class="stat-label">Port</div>
      <div class="stat-value" id="statPort">--</div>
    </div>
  </div>

  <!-- Core Config -->
  <div class="card">
    <div class="card-header">
      <h2>Core Configuration</h2>
      <button class="btn btn-primary btn-sm" onclick="saveConfig()">Save & Restart Required</button>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Port</label>
          <input type="number" id="cfgPort" placeholder="3000">
        </div>
        <div class="form-group">
          <label>Auth Token</label>
          <input type="text" id="cfgAuthToken" placeholder="Leave empty to disable auth">
        </div>
        <div class="form-group span-2">
          <label>Target URL</label>
          <input type="url" id="cfgTargetUrl" placeholder="https://example.com/webhook/...">
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="cfgForwardPath">
            <label for="cfgForwardPath" style="color:var(--text)">Forward Path (append path to target URL)</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Proxy Profiles -->
  <div class="card">
    <div class="card-header">
      <h2>Proxy Profiles</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm" onclick="reloadProfiles()">Reload</button>
        <button class="btn btn-primary btn-sm" onclick="openProfileModal()">+ New Profile</button>
      </div>
    </div>
    <div class="card-body">
      <div id="profileList" class="profile-list">
        <div class="empty-state">
          <p>Loading profiles...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New Profile</h3>
      <button class="close-btn" onclick="closeProfileModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Profile Name *</label>
          <input type="text" id="pName" placeholder="e.g. infobip">
        </div>
        <div class="form-group">
          <label>Auth Header *</label>
          <input type="text" id="pAuthHeader" placeholder="e.g. Authorization">
        </div>
        <div class="form-group span-2">
          <label>Target URL *</label>
          <input type="url" id="pTargetUrl" placeholder="https://api.example.com">
        </div>
        <div class="form-group span-2">
          <label>API Key *</label>
          <input type="text" id="pApiKey" placeholder="Your API key">
        </div>
        <div class="form-group">
          <label>Auth Prefix</label>
          <input type="text" id="pAuthPrefix" placeholder="e.g. Bearer, App">
        </div>
        <div class="form-group">
          <label>Access Key</label>
          <input type="text" id="pAccessKey" placeholder="Optional shared secret">
        </div>
        <div class="form-group span-2">
          <label>Blocked Extensions (comma-separated)</label>
          <input type="text" id="pBlocked" placeholder=".exe, .bat, .sh">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeProfileModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const TOKEN_KEY = 'midleman_token';
let authToken = localStorage.getItem(TOKEN_KEY) || '';
let editingProfile = null;

// On load, prompt for token if not set
(async function init() {
  if (!authToken) {
    authToken = prompt('Enter your Auth Token (X-Forward-Token):') || '';
    if (authToken) localStorage.setItem(TOKEN_KEY, authToken);
  }
  await refreshAll();
  setInterval(fetchHealth, 10000);
})();

function headers() {
  return { 'Content-Type': 'application/json', 'X-Forward-Token': authToken };
}

async function api(path, opts = {}) {
  const res = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
  if (res.status === 401) {
    authToken = prompt('Unauthorized. Enter a valid Auth Token:') || '';
    if (authToken) localStorage.setItem(TOKEN_KEY, authToken);
    else localStorage.removeItem(TOKEN_KEY);
    throw new Error('Unauthorized');
  }
  return res;
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatUptime(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

async function fetchHealth() {
  try {
    const res = await fetch('/health');
    const data = await res.json();
    document.getElementById('statUptime').textContent = formatUptime(data.uptime);
    document.getElementById('statRequests').textContent = data.activeRequests;
    document.getElementById('statProfiles').textContent = data.proxyProfiles;
    document.getElementById('statusBadge').className = 'status-badge online';
    document.getElementById('statusText').textContent = 'Online';
  } catch {
    document.getElementById('statusBadge').className = 'status-badge offline';
    document.getElementById('statusText').textContent = 'Offline';
  }
}

async function fetchConfig() {
  try {
    const res = await api('/admin/config');
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('cfgPort').value = data.port || '';
    document.getElementById('cfgTargetUrl').value = data.targetUrl || '';
    document.getElementById('cfgAuthToken').value = data.authToken || '';
    document.getElementById('cfgForwardPath').checked = data.forwardPath !== false;
    document.getElementById('statPort').textContent = data.port || '--';
  } catch {}
}

async function fetchProfiles() {
  try {
    const res = await api('/admin/profiles');
    if (!res.ok) return;
    const data = await res.json();
    renderProfiles(data.profiles || []);
  } catch {}
}

function renderProfiles(profiles) {
  const container = document.getElementById('profileList');
  if (profiles.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No proxy profiles configured. Click "+ New Profile" to add one.</p></div>';
    return;
  }
  container.innerHTML = profiles.map(p => `
    <div class="profile-item">
      <div class="profile-info">
        <div class="profile-name">${esc(p.name)}</div>
        <div class="profile-url">${esc(p.targetUrl)}</div>
        <div class="profile-meta">
          <span class="profile-tag">${esc(p.authHeader)}${p.authPrefix ? ' (' + esc(p.authPrefix) + ')' : ''}</span>
          ${p.hasAccessKey ? '<span class="profile-tag" style="color:var(--orange)">Access Key</span>' : ''}
          ${(p.blockedExtensions && p.blockedExtensions.length) ? '<span class="profile-tag" style="color:var(--red)">Blocked: ' + esc(p.blockedExtensions.join(', ')) + '</span>' : ''}
          ${p.apiKey ? '' : '<span class="profile-tag" style="color:var(--text2)">Key: hidden</span>'}
        </div>
      </div>
      <div class="profile-actions">
        <a class="btn btn-sm" href="${location.origin}/proxy/${encodeURIComponent(p.name)}/" target="_blank" style="text-decoration:none">Open</a>
        <button class="btn btn-sm" onclick="copyProxyUrl('${esc(p.name)}')">Copy URL</button>
        <button class="btn btn-sm" onclick="editProfile('${esc(p.name)}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProfile('${esc(p.name)}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function refreshAll() {
  await Promise.all([fetchHealth(), fetchConfig(), fetchProfiles()]);
}

// Config save — writes .env via admin API
async function saveConfig() {
  try {
    const res = await api('/admin/config', {
      method: 'PUT',
      body: JSON.stringify({
        port: parseInt(document.getElementById('cfgPort').value) || 3000,
        targetUrl: document.getElementById('cfgTargetUrl').value,
        authToken: document.getElementById('cfgAuthToken').value,
        forwardPath: document.getElementById('cfgForwardPath').checked,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      toast(data.message || 'Config saved! Restart to apply core changes.');
      // Update the stored token if it changed
      const newToken = document.getElementById('cfgAuthToken').value;
      if (newToken && newToken !== authToken) {
        authToken = newToken;
        localStorage.setItem(TOKEN_KEY, authToken);
      }
    } else {
      toast(data.error || 'Failed to save config', 'error');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

// Profile CRUD
function openProfileModal(profile = null) {
  editingProfile = profile;
  document.getElementById('modalTitle').textContent = profile ? 'Edit Profile' : 'New Profile';
  document.getElementById('pName').value = profile ? profile.name : '';
  document.getElementById('pName').disabled = !!profile;
  document.getElementById('pTargetUrl').value = profile ? profile.targetUrl : '';
  document.getElementById('pApiKey').value = profile ? (profile.apiKey || '') : '';
  document.getElementById('pAuthHeader').value = profile ? profile.authHeader : '';
  document.getElementById('pAuthPrefix').value = profile ? (profile.authPrefix || '') : '';
  document.getElementById('pAccessKey').value = profile ? (profile.accessKey || '') : '';
  document.getElementById('pBlocked').value = profile && profile.blockedExtensions
    ? profile.blockedExtensions.join(', ') : '';
  document.getElementById('profileModal').classList.add('active');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('active');
  editingProfile = null;
}

async function saveProfile() {
  const body = {
    name: document.getElementById('pName').value.trim(),
    targetUrl: document.getElementById('pTargetUrl').value.trim(),
    apiKey: document.getElementById('pApiKey').value.trim(),
    authHeader: document.getElementById('pAuthHeader').value.trim(),
  };
  const prefix = document.getElementById('pAuthPrefix').value.trim();
  if (prefix) body.authPrefix = prefix;
  const accessKey = document.getElementById('pAccessKey').value.trim();
  if (accessKey) body.accessKey = accessKey;
  const blocked = document.getElementById('pBlocked').value.trim();
  if (blocked) body.blockedExtensions = blocked.split(',').map(s => s.trim()).filter(Boolean);

  try {
    const res = await api('/admin/profiles', { method: 'POST', body: JSON.stringify(body) });
    const data = await res.json();
    if (res.ok) {
      toast('Profile ' + (data.status || 'saved'));
      closeProfileModal();
      await fetchProfiles();
      await fetchHealth();
    } else {
      toast(data.error || 'Failed to save profile', 'error');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

async function editProfile(name) {
  try {
    const res = await api('/admin/profiles/' + encodeURIComponent(name));
    if (!res.ok) { toast('Profile not found', 'error'); return; }
    const data = await res.json();
    openProfileModal(data.profile);
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

async function deleteProfile(name) {
  if (!confirm('Delete profile "' + name + '"?')) return;
  try {
    const res = await api('/admin/profiles/' + encodeURIComponent(name), { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      toast('Profile deleted');
      await fetchProfiles();
      await fetchHealth();
    } else {
      toast(data.error || 'Failed to delete', 'error');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

function copyProxyUrl(name) {
  const url = location.origin + '/proxy/' + encodeURIComponent(name) + '/';
  navigator.clipboard.writeText(url).then(() => toast('Copied: ' + url)).catch(() => {
    prompt('Copy this URL:', url);
  });
}

async function reloadProfiles() {
  try {
    const res = await api('/admin/reload', { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      toast('Profiles reloaded: ' + (data.profiles || []).join(', '));
      await fetchProfiles();
      await fetchHealth();
    } else {
      toast(data.error || 'Reload failed', 'error');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

// Close modal on overlay click
document.getElementById('profileModal').addEventListener('click', function(e) {
  if (e.target === this) closeProfileModal();
});

// Close modal on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeProfileModal();
});
</script>
</body>
</html>
