<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<title>{{STATUS}} — Midleman</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1c1e2b;
    --border: #2e3148;
    --text: #e4e6f0;
    --text2: #8b8fa7;
    --text3: #5d6180;
    --accent: #6c5ce7;
    --accent2: #8577ed;
    --green: #00b894;
    --red: #e17055;
    --orange: #fdcb6e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    max-width: 480px;
    padding: 56px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .error-code {
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .error-code.c401 {
    background: linear-gradient(135deg, var(--orange), #f39c12);
    -webkit-background-clip: text; background-clip: text;
  }
  .error-code.c404 {
    background: linear-gradient(135deg, var(--red), #e74c3c);
    -webkit-background-clip: text; background-clip: text;
  }
  .error-code.c500, .error-code.c502, .error-code.c503 {
    background: linear-gradient(135deg, var(--red), #c0392b);
    -webkit-background-clip: text; background-clip: text;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }
  .message {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .message a { color: var(--accent2); text-decoration: none; }
  .message a:hover { text-decoration: underline; }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn:hover { background: #242736; border-color: #3a3d55; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .brand {
    margin-top: 36px;
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .brand img { width: 18px; height: 18px; border-radius: 4px; opacity: 0.5; }
  .brand span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="error-code {{STATUS_CLASS}}">{{STATUS_CODE}}</div>
  <div class="title">{{TITLE}}</div>
  <div class="message">{{MESSAGE}}</div>
  <div class="actions">
    <a href="/" class="btn">Home</a>
    <a href="/dashboard" class="btn btn-primary">Dashboard</a>
  </div>
  <div class="brand">
    <img src="/logo.svg" alt="">
    Powered by <span>Midleman</span>
  </div>
</div>
</body>
</html>
