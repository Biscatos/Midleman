services:
  # ─── Midleman Proxy (Production) ────────────────────────────────────────────
  bun-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: midleman
    ports:
      - "${PORT:-3000}:3000"            # Admin dashboard (reserved)
      - "4000-4050:4000-4050"           # Auto-assigned proxy/target ports
      - "${JWKS_PORT:-8443}:8443"       # Public OIDC discovery (jwks.json) — expose via Nginx
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - FORWARD_PATH=${FORWARD_PATH:-true}
      - DATA_DIR=/app/data
      - JWT_ISSUER=${JWT_ISSUER}
      - JWKS_PORT=8443
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-midleman}
      - OTEL_METRICS_INTERVAL=${OTEL_METRICS_INTERVAL:-15000}
      - PORT_RANGE_START=${PORT_RANGE_START:-4000}
      # Log verbosity: error | warn | info | debug (default info). Set to "warn"
      # or "error" to keep the container quiet (only problems).
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # ─── NPM integration (optional addon) ───────────────────────────────
      # Uncomment to bootstrap settings from env. Credentials are still managed
      # in the dashboard (encrypted at rest). The cert volume below is also opt-in.
      # - NPM_API_URL=http://app:81
      # - NPM_LETSENCRYPT_DIR=/etc/letsencrypt
      # - MIDLEMAN_PUBLIC_HOST=midleman
    volumes:
      - midleman-data:/app/data
      - ./.env:/app/.env:ro
      # ─── NPM integration (optional) ─────────────────────────────────────
      # Mount the same volume NPM uses for Let's Encrypt, read-only. When
      # present, Midleman reads NPM-issued certs straight from disk and the
      # internal ACME renewer is disabled (NPM owns Let's Encrypt).
      # - reverse_proxy_letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    # Cap container log size so it can never fill the disk: 3 files × 20MB = 60MB
    # max, oldest rotated out. This is the real fix for unbounded log growth —
    # it bounds ALL output (including errors), independent of LOG_LEVEL.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    # depends_on:
      # otel-collector:
      #   condition: service_started
    healthcheck:
      test: [ "CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s


volumes:
  midleman-data:
    name: midleman-data
  prometheus-data:
    name: midleman-prometheus
  grafana-data:
    name: midleman-grafana
  # Shared with the Nginx Proxy Manager stack. Mark as external so
  # `docker compose down -v` here doesn't destroy NPM's certs.
  # Enable by uncommenting both this entry and the matching volume mount above.
  # reverse_proxy_letsencrypt:
  #   external: true
  #   name: reverse_proxy_letsencrypt

# To use the NPM integration in the same network as the NPM stack, also add:
#
# networks:
#   default:
#     name: proxy-manager
#     external: true
