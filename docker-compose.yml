services:
  # ─── Midleman Proxy (Production) ────────────────────────────────────────────
  bun-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: midleman
    ports:
      - "${PORT:-3000}:3000"
      - "3001-3010:3001-3010"  # Named target ports
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - FORWARD_PATH=${FORWARD_PATH:-true}
      - DATA_DIR=/app/data
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-midleman}
      - OTEL_METRICS_INTERVAL=${OTEL_METRICS_INTERVAL:-15000}
    volumes:
      - midleman-data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    # depends_on:
      # otel-collector:
      #   condition: service_started
    healthcheck:
      test: [ "CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s


  # ─── Development Mode (hot reload) ─────────────────────────────────────────
  bun-forwarder-dev:
    image: oven/bun:1
    container_name: midleman-dev
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - midleman-data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - FORWARD_PATH=${FORWARD_PATH:-true}
      - DATA_DIR=/app/data
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_ENDPOINT=${OTEL_ENDPOINT:-http://otel-collector:4318}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-midleman}
      - OTEL_METRICS_INTERVAL=${OTEL_METRICS_INTERVAL:-15000}
    command: bun run --watch src/index.ts
    profiles:
      - dev

volumes:
  midleman-data:
    name: midleman-data
  prometheus-data:
    name: midleman-prometheus
  grafana-data:
    name: midleman-grafana
