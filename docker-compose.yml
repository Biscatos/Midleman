services:
  bun-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bun-forwarder
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - FORWARD_PATH=${FORWARD_PATH:-true}
      - DATA_DIR=/app/data
    volumes:
      - midleman-data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Development mode with hot reload
  bun-forwarder-dev:
    image: oven/bun:1
    container_name: bun-forwarder-dev
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - midleman-data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - FORWARD_PATH=${FORWARD_PATH:-true}
      - DATA_DIR=/app/data
    command: bun run --watch src/index.ts
    profiles:
      - dev

volumes:
  midleman-data:
    name: midleman-data
